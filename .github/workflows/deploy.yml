# Continuous delivery: on every push to main, build the image in the cloud and
# create/update the AgentKit runtime. Set these repo secrets first
# (Settings → Secrets and variables → Actions):
#   VOLCENGINE_ACCESS_KEY, VOLCENGINE_SECRET_KEY, FEISHU_APP_ID, FEISHU_APP_SECRET
# Optionally set the VOLCENGINE_REGION repo variable.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  VOLCENGINE_ACCESS_KEY: ${{ secrets.VOLCENGINE_ACCESS_KEY }}
  VOLCENGINE_SECRET_KEY: ${{ secrets.VOLCENGINE_SECRET_KEY }}
  VOLCENGINE_REGION: ${{ vars.VOLCENGINE_REGION || 'cn-beijing' }}
  FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
  FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
  USERPOOL_ID: ${{ secrets.USERPOOL_ID }}
  USERPOOL_CLIENT_ID: ${{ secrets.USERPOOL_CLIENT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the agentkit CLI (standalone binary — no Node.js needed).
      - name: Install agentkit CLI
        run: |
          wget -qO- https://agentkit-cli.tos-cn-beijing.volces.com/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Reads .agentkit/agentkit.yaml + Dockerfile → cloud build → create/update runtime.
      - name: Deploy
        timeout-minutes: 60
        run: agentkit deploy

      - name: Print AgentKit build logs on failure
        if: failure()
        run: |
          echo "AgentKit artifact files:"
          find .agentkit/artifacts -maxdepth 3 -type f -print || true

          found=0
          for log in .agentkit/artifacts/*/build.log; do
            if [ -f "$log" ]; then
              found=1
              echo "::group::$log"
              tail -n 500 "$log"
              echo "::endgroup::"
            fi
          done

          if [ "$found" -eq 0 ]; then
            echo "No AgentKit build.log found."
          fi

      # Smoke test the deployed runtime (non-blocking).
      - name: Smoke test
        run: agentkit invoke agentkit-arkclaw-assistant0 -m "ping" --json || true
